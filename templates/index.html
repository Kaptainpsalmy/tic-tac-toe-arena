<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Tic Tac Toe Arena ⚔️</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Fonts for better typography -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-wrapper">
        <!-- Animated background particles -->
        <div class="particles"></div>

        <!-- Main Game Container -->
        <div class="container">
            <!-- Header with Arena Title -->
            <div class="header">
                <h1>
                    <span class="glitch-text">TIC TAC TOE</span>
                    <span class="arena-badge">ARENA ⚔️</span>
                </h1>
            </div>

            <!-- Player Stats / Score Board -->
            <div class="score-board">
                <div class="player-card player-x">
                    <div class="player-icon">❌</div>
                    <div class="player-name">Player X</div>
                    <div class="player-score" id="scoreX">0</div>
                </div>
                <div class="vs-divider">VS</div>
                <div class="player-card player-o">
                    <div class="player-icon">⭕</div>
                    <div class="player-name">Player O</div>
                    <div class="player-score" id="scoreO">0</div>
                </div>
            </div>

            <!-- Game Status Bar -->
            <div class="status-bar">
                <div class="status-card" id="statusMessage">
                    <span class="turn-indicator"></span>
                    <span class="status-text">Player X's turn</span>
                </div>
                <div class="move-counter" id="moveCounter">
                    <i class="fas fa-history"></i>
                    <span>Moves: 0</span>
                </div>
            </div>

            <!-- Game Board -->
            <div class="board-container">
                <div class="board" id="board">
                    <!-- Board will be generated by JavaScript -->
                </div>

                <!-- Winning Overlay (shown when game ends) -->
                <div class="winning-overlay" id="winningOverlay">
                    <div class="winning-content">
                        <i class="fas fa-trophy"></i>
                        <h2 id="winnerMessage">Player X Wins!</h2>
                        <button class="play-again-btn" id="playAgainFromOverlay">
                            <i class="fas fa-redo-alt"></i> Play Again
                        </button>
                    </div>
                </div>
            </div>

            <!-- Game Controls -->
            <div class="game-controls">
                <button class="control-btn reset" id="resetBtn">
                    <i class="fas fa-redo-alt"></i>
                    <span>New Game</span>
                </button>
                <button class="control-btn undo" id="undoBtn" disabled>
                    <i class="fas fa-undo-alt"></i>
                    <span>Undo</span>
                </button>
                <button class="control-btn settings" id="settingsBtn">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </button>
            </div>

            <!-- Game Modes (Future Feature) -->
            <div class="game-modes">
                <button class="mode-btn active" data-mode="2p">
                    <i class="fas fa-users"></i> 2 Player
                </button>
                <button class="mode-btn" data-mode="ai-easy">
                    <i class="fas fa-robot"></i> AI Easy
                </button>
                <button class="mode-btn" data-mode="ai-hard">
                    <i class="fas fa-brain"></i> AI Hard
                </button>
            </div>

            <!-- Move History (Optional) -->
            <div class="move-history" id="moveHistory">
                <div class="history-header">
                    <i class="fas fa-list"></i>
                    <span>Move History</span>
                    <button class="clear-history" id="clearHistory">Clear</button>
                </div>
                <div class="history-list" id="historyList">
                    <!-- Moves will appear here -->
                </div>
            </div>
        </div>

        <!-- Settings Modal -->
        <div class="modal" id="settingsModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2><i class="fas fa-cog"></i> Game Settings</h2>
                    <button class="close-modal" id="closeModal">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="setting-item">
                        <label>
                            <i class="fas fa-volume-up"></i>
                            Sound Effects
                        </label>
                        <label class="switch">
                            <input type="checkbox" id="soundToggle" checked>
                            <span class="slider round"></span>
                        </label>
                    </div>
                    <div class="setting-item">
                        <label>
                            <i class="fas fa-palette"></i>
                            Dark Theme
                        </label>
                        <label class="switch">
                            <input type="checkbox" id="themeToggle" checked>
                            <span class="slider round"></span>
                        </label>
                    </div>
                    <div class="setting-item">
                        <label>
                            <i class="fas fa-bolt"></i>
                            Animations
                        </label>
                        <label class="switch">
                            <input type="checkbox" id="animationsToggle" checked>
                            <span class="slider round"></span>
                        </label>
                    </div>
                    <div class="setting-item">
                        <label>
                            <i class="fas fa-clock"></i>
                            Move Timer
                        </label>
                        <label class="switch">
                            <input type="checkbox" id="timerToggle">
                            <span class="slider round"></span>
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Confetti Canvas -->
    <canvas id="confetti-canvas" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999;"></canvas>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
